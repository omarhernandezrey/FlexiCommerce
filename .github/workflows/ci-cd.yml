name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # Lint & Type Check
  lint-and-type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      # Monorepo con npm workspaces: una sola instalación desde la raíz
      - name: Install dependencies
        run: npm ci

      # Sin el cliente generado, @prisma/client no exporta los tipos del schema
      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Lint backend
        run: npm run lint --prefix backend || true

      - name: Type check backend
        run: npm run type-check --prefix backend

      - name: Lint frontend
        run: npm run lint --prefix frontend || true

  # Tests (unitarios backend + frontend)
  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: flexicommerce_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: backend

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/flexicommerce_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
        run: npm test --prefix backend

      - name: Run frontend tests
        env:
          CI: 'true'
        run: npm test --prefix frontend

  # Build Backend
  build-backend:
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr exige el nombre del repositorio en minúsculas
      - name: Lowercase image name
        id: image
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/backend:buildcache,mode=max

  # Build Frontend
  build-frontend:
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr exige el nombre del repositorio en minúsculas
      - name: Lowercase image name
        id: image
        run: echo "name=${REPO,,}" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ steps.image.outputs.name }}/frontend:buildcache,mode=max

  # Verificación de despliegue: levanta el stack completo con Docker Compose
  # y ejecuta smoke tests contra la aplicación corriendo (espejo del Jenkins local)
  deploy-verification:
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - uses: actions/checkout@v4

      - name: Crear .env de CI
        run: |
          cp .env.example .env
          sed -i "s/^JWT_SECRET=$/JWT_SECRET=$(openssl rand -hex 32)/" .env

      - name: Levantar stack completo
        run: docker compose up -d --build

      - name: Smoke tests contra la app desplegada
        run: |
          echo "Esperando a que el backend esté disponible..."
          ok=0
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health >/dev/null 2>&1; then ok=1; break; fi
            sleep 5
          done
          [ "$ok" = "1" ] || { echo "El backend no respondió a tiempo"; exit 1; }

          echo "[1/3] Health check del backend"
          curl -sf http://localhost:3001/api/health | grep -q '"status":"OK"'

          echo "[2/3] API + base de datos (GET /api/products)"
          curl -sf 'http://localhost:3001/api/products?limit=1' | grep -q '"success":true'

          echo "[3/3] Frontend responde 200"
          code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/)
          [ "$code" = "200" ] || { echo "Frontend respondió $code"; exit 1; }

          echo "✅ Aplicación desplegada, operativa y verificada en CI"

      - name: Logs del stack (solo si falla)
        if: failure()
        run: docker compose logs --tail=120

      - name: Apagar stack
        if: always()
        run: docker compose down -v

  # Security Scanning
  security-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      # Requerido para subir resultados SARIF a la pestaña Security
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Deploy to staging (develop branch only) — requiere secrets STAGING_*
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, security-scan, integration-tests, deploy-verification]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    env:
      DEPLOY_KEY: ${{ secrets.STAGING_DEPLOY_KEY }}
      DEPLOY_HOST: ${{ secrets.STAGING_HOST }}
      DEPLOY_USER: ${{ secrets.STAGING_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        if: ${{ env.DEPLOY_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd /var/www/flexicommerce && docker compose pull && docker compose up -d"

      - name: Skip notice
        if: ${{ env.DEPLOY_KEY == '' }}
        run: echo "Deploy a staging omitido — secrets STAGING_* no configurados"

  # Deploy to production (main branch only) — requiere secrets PRODUCTION_*
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, security-scan, integration-tests, deploy-verification]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      DEPLOY_KEY: ${{ secrets.PRODUCTION_DEPLOY_KEY }}
      DEPLOY_HOST: ${{ secrets.PRODUCTION_HOST }}
      DEPLOY_USER: ${{ secrets.PRODUCTION_USER }}

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        if: ${{ env.DEPLOY_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key $DEPLOY_USER@$DEPLOY_HOST "cd /var/www/flexicommerce && docker compose pull && docker compose up -d && docker compose exec -T backend npx prisma migrate deploy"

      - name: Skip notice
        if: ${{ env.DEPLOY_KEY == '' }}
        run: echo "Deploy a producción omitido — secrets PRODUCTION_* no configurados (el deploy local lo hace Jenkins)"

  # Notify Slack — requiere secret SLACK_WEBHOOK_URL
  notify-slack:
    runs-on: ubuntu-latest
    if: always()
    needs: [lint-and-type-check, build-backend, build-frontend, security-scan, integration-tests, deploy-verification]

    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Slack notification
        if: ${{ env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "FlexiCommerce CI/CD Pipeline: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*FlexiCommerce CI/CD Pipeline*\nStatus: `${{ job.status }}`\nBranch: `${{ github.ref_name }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
      - name: Skip notice
        if: ${{ env.SLACK_WEBHOOK_URL == '' }}
        run: echo "Notificación a Slack omitida — secret SLACK_WEBHOOK_URL no configurado"
