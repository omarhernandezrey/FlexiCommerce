# =============================================================================
# FlexiCommerce — Override de desarrollo (hot-reload)
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Monta el código fuente dentro de los contenedores y usa los servidores de
# desarrollo (tsx watch / next dev) en lugar de las imágenes de producción.
# =============================================================================

services:
  backend:
    build:
      context: ./backend
      target: deps
    image: flexicommerce-api-dev
    environment:
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm ci && npx prisma generate && npx prisma migrate deploy && npm run dev"
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3001/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      target: deps
    image: flexicommerce-web-dev
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    command: sh -c "npm ci && npm run dev"

volumes:
  backend_node_modules:
  frontend_node_modules:
  frontend_next_cache:
