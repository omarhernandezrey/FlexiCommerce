global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alerts.yml"

scrape_configs:
  # Backend Express metrics (via prom-client)
  - job_name: "flexicommerce-backend"
    static_configs:
      - targets: ["host.docker.internal:3001"]
    metrics_path: "/api/metrics"

  # Node.js process metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
