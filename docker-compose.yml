# =============================================================================
# FlexiCommerce — Stack de producción
#
#   cp .env.example .env   (y completa JWT_SECRET, Wompi, etc.)
#   docker compose up -d --build
#
# Desarrollo con hot-reload:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# PgAdmin (opcional):
#   docker compose --profile dev-tools up -d
#
# Jenkins CI (opcional):
#   docker compose --profile ci up -d --build
# =============================================================================

name: flexicommerce

services:
  postgres:
    image: postgres:16-alpine
    container_name: flexicommerce-db
    environment:
      POSTGRES_USER: ${DB_USER:-flexicommerce}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-flexicommerce_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-flexicommerce} -d ${DB_NAME:-flexicommerce_dev}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flexicommerce
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: flexicommerce-cache
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flexicommerce
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: flexicommerce-api
    container_name: flexicommerce-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-flexicommerce}:${DB_PASSWORD:-dev_password}@postgres:5432/${DB_NAME:-flexicommerce_dev}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?Define JWT_SECRET en el archivo .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
      # Wompi Colombia
      WOMPI_ENV: ${WOMPI_ENV:-sandbox}
      WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
      WOMPI_PRIVATE_KEY: ${WOMPI_PRIVATE_KEY:-}
      WOMPI_INTEGRITY_SECRET: ${WOMPI_INTEGRITY_SECRET:-}
      WOMPI_EVENTS_SECRET: ${WOMPI_EVENTS_SECRET:-}
      # Observabilidad (opcional)
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flexicommerce
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-FlexiCommerce}
        NEXT_PUBLIC_WOMPI_PUBLIC_KEY: ${WOMPI_PUBLIC_KEY:-}
        NEXT_PUBLIC_WOMPI_ENV: ${WOMPI_ENV:-sandbox}
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    image: flexicommerce-web
    container_name: flexicommerce-web
    environment:
      NODE_ENV: production
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - flexicommerce
    restart: unless-stopped

  jenkins:
    build:
      context: ./ci/jenkins
      args:
        # Debe coincidir con: stat -c '%g' /var/run/docker.sock
        DOCKER_GID: ${DOCKER_GID:-1001}
    image: flexicommerce-jenkins
    container_name: flexicommerce-jenkins
    environment:
      JENKINS_ADMIN_USER: ${JENKINS_ADMIN_USER:-admin}
      JENKINS_ADMIN_PASSWORD: ${JENKINS_ADMIN_PASSWORD:-flexicommerce}
    ports:
      - "${JENKINS_PORT:-8080}:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      # Daemon de Docker del host (para construir las imágenes del proyecto)
      - /var/run/docker.sock:/var/run/docker.sock
      # Repo local — el job de CI clona desde file:///workspace
      - .:/workspace:ro
    restart: unless-stopped
    profiles:
      - ci

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: flexicommerce-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flexicommerce
    profiles:
      - dev-tools

volumes:
  postgres_data:
  redis_data:
  jenkins_home:

networks:
  flexicommerce:
    driver: bridge
